<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot - WhatsApp</title>
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="chat-app">
        <header class="chat-header">
            <div class="chat-header-left">
                <div class="chat-logo">💬</div>
                <div>
                    <div class="chat-title">ChatBot Webhook</div>
                    <div class="chat-subtitle">LastLink + WhatsApp</div>
                </div>
            </div>
            <button class="btn-logout" id="logoutBtn">Sair</button>
        </header>

        <main class="chat-main">
            <aside class="contacts-sidebar" id="contactsSidebar">
                <div class="contacts-header">
                    <h3>Contatos</h3>
                </div>
                <div class="contacts-search">
                    <input type="text" id="contactSearch" placeholder="Buscar contato...">
                </div>
                <div class="contacts-list" id="contactsList">
                    <div class="no-contacts">Nenhum contato encontrado</div>
                </div>
            </aside>

            <section class="chat-area">
                <div class="chat-area-header" id="chatAreaHeader" style="display:none;">
                    <div class="contact-avatar" id="chatAreaAvatar">--</div>
                    <div>
                        <div class="chat-area-name" id="chatAreaName">Selecione um contato</div>
                        <div class="chat-area-status" id="chatAreaStatus"></div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-chat">
                        <div class="empty-chat-icon">💬</div>
                        <h3>Selecione um contato</h3>
                        <p>Escolha uma conversa para ver as mensagens</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="chatInput" placeholder="Digite uma mensagem..." rows="1"></textarea>
                    <button class="btn-send" id="sendBtn">➤</button>
                </div>
            </section>
        </main>

        <footer class="status-bar">
            <div class="status-left">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Verificando status...</span>
            </div>
            <div style="font-size: 0.75rem; color: #8696a0;">LastLink + WhatsApp Integration</div>
        </footer>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
