services:
  - type: web
    name: webhook-chatbot
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_TOKEN
        generateValue: true
      - key: SESSION_DIR
        value: /data/auth_info
      - key: PORT
        value: 10000
    disk:
      name: whatsapp-session
      mountPath: /data
      sizeGB: 1
